<!--
  Supabase: Authentication → Email Templates → Confirm signup
  Paste the inner content into the template body (or wrap in <!DOCTYPE html> if your provider needs a full document).
-->
<div style="font-family: 'DM Sans', Arial, sans-serif; max-width: 520px; margin: 0 auto; padding: 40px 24px; background: #f7f6f3; color: #1a1a18;">
  <p style="font-size: 22px; font-family: Georgia, serif; margin: 0 0 16px;">
    Bevestig je account
  </p>

  <p style="font-size: 15px; color: #7a7870; line-height: 1.6; margin: 0 0 28px;">
    Klik op de knop hieronder om je account te activeren en te beginnen met oefenen.
  </p>

  <a href="{{ .ConfirmationURL }}"
     style="display: inline-block; background: #2d6a4f; color: #fff !important; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;">
    Account bevestigen
  </a>

  <p style="font-size: 12px; color: #7a7870; margin-top: 32px; line-height: 1.5;">
    Als je je niet hebt aangemeld bij afgeleideoefenen.nl, kun je deze e-mail negeren.
  </p>
</div>
